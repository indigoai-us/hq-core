sandbox_mode = "danger-full-access"
approval_policy = "never"

# Default reasoning effort for HQ Codex sessions. `xhigh` is the highest tier
# Codex exposes (above `high`) and the strongest one that runs cleanly on HQ's
# models (gpt-5.5 / gpt-5.3-codex-spark). Note: `minimal` is unavailable in this
# Codex build — its always-on image_gen tool is incompatible with minimal effort.
# Override per-invocation with `-c model_reasoning_effort=<low|medium|high|xhigh>`.
model_reasoning_effort = "xhigh"

[shell_environment_policy]
inherit = "core"

[sandbox_workspace_write]
network_access = true

[features]
hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = '/bin/bash "$(git rev-parse --show-toplevel)/.codex/hooks/hq-codex-hook-adapter.sh"'
timeout = 30
statusMessage = "Loading HQ context"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = '/bin/bash "$(git rev-parse --show-toplevel)/.codex/hooks/hq-codex-hook-adapter.sh"'
timeout = 30
statusMessage = "Routing HQ prompt"

[[hooks.PreToolUse]]
matcher = "Bash|apply_patch|Edit|Write|Read"

[[hooks.PreToolUse.hooks]]
type = "command"
command = '/bin/bash "$(git rev-parse --show-toplevel)/.codex/hooks/hq-codex-hook-adapter.sh"'
timeout = 30
statusMessage = "Checking HQ safety rails"

[[hooks.PostToolUse]]
matcher = "Bash|apply_patch|Edit|Write"

[[hooks.PostToolUse.hooks]]
type = "command"
command = '/bin/bash "$(git rev-parse --show-toplevel)/.codex/hooks/hq-codex-hook-adapter.sh"'
timeout = 30
statusMessage = "Running HQ post-tool hooks"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = '/bin/bash "$(git rev-parse --show-toplevel)/.codex/hooks/hq-codex-hook-adapter.sh"'
timeout = 30
statusMessage = "Wrapping HQ session state"

[[hooks.PreCompact]]

[[hooks.PreCompact.hooks]]
type = "command"
command = '/bin/bash "$(git rev-parse --show-toplevel)/.codex/hooks/hq-codex-hook-adapter.sh"'
timeout = 30
statusMessage = "Running HQ pre-compact hooks"
