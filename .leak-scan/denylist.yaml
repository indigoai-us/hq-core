# Leak-scan denylist for hq-core-staging CI
#
# Purpose: catch plaintext that should have been scrubbed before arriving here.
# The "companies", "persons", "domains" keys below are the plaintext terms — if
# any of them appear in a file touched by a PR (outside of `exceptions`), the
# denylist-scan CI job fails.
#
# Sync source (one-time snapshot on 2026-04-22): HQ private scrub denylist.
# Drift policy: manual for now — re-sync when the sibling pipeline project
# lands a source-of-truth decision. See CONTRIBUTING.md.

version: 1

# Scope note for staging CI:
# hq-core intentionally ships "indigo" (brand name) and "indigo-hq.com"
# (production domain referenced by deploy skills). Those terms do NOT appear
# here. This denylist is the narrower set of terms that must NEVER land in
# public hq-core content — other companies, personal identities, private
# domains, retired product names.

companies:
  liverecover: "{company}"
  golden-thread: "{company}"
  haven-slay: "{company}"
  holler-mgmt: "{company}"
  brandstage: "{company}"
  estate-manager: "{company}"
  keptwork: "{company}"
  tonal: "{company}"
  moonflow: "{company}"
  dominion: "{company}"
  hpo: "{company}"
  amass: "{company}"
  magical-moments: "{company}"
  dripkit: "{company}"
  empire-os: "{company}"
  new-american-codex: "{company}"

persons:
  coreyepstein: "{your-name}"

domains:
  coreyepstein.com: "{your-domain}.com"
  getindigo.ai: "{your-domain}.ai"
  vyg.ai: "{your-domain}.ai"

exceptions:
  # Strings that literally contain a denylist key but are allowed.
  # (Currently empty — add here if a legitimate reference needs to slip
  # past a denylist match, e.g. a changelog citation.)
  {}
