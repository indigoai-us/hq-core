worker:
  id: pretty-mermaid
  name: "Pretty Mermaid"
  type: OpsWorker
  status: active

description: |
  Renders Mermaid diagrams to SVG or ASCII with 14 professional themes.
  Wraps github.com/imxv/Pretty-mermaid-skills.

execution:
  mode: on-demand
  max_runtime: 5m
  model: opus

context:
  base:
    - workers/public/pretty-mermaid/references/THEMES.md
    - workers/public/pretty-mermaid/references/DIAGRAM_TYPES.md

skills:
  - id: render
    name: "Render Diagram"
    description: "Render a single .mmd file to SVG or ASCII"
    interface:
      inputs:
        - name: input
          type: path
          required: true
          description: "Path to .mmd file"
        - name: output
          type: path
          required: false
          description: "Output path (default: same dir, .svg)"
        - name: theme
          type: string
          required: false
          default: "tokyo-night"
          description: "Theme name (14 available)"
        - name: format
          type: string
          required: false
          default: "svg"
          description: "svg or ascii"
      outputs:
        - name: diagram
          type: file
          destination: "{output}"
    mutating: true

  - id: batch
    name: "Batch Render"
    description: "Render all .mmd files in a directory"
    interface:
      inputs:
        - name: input_dir
          type: path
          required: true
        - name: output_dir
          type: path
          required: true
        - name: theme
          type: string
          required: false
          default: "tokyo-night"
        - name: workers
          type: number
          required: false
          default: 4
      outputs:
        - name: diagrams
          type: file
          destination: "{output_dir}/"
    mutating: true

  - id: themes
    name: "List Themes"
    description: "Show all 14 available themes"
    mutating: false

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state

verification:
  post_execute:
    - check: output_exists
      description: "Rendered file exists"

instructions: |
  # Pretty Mermaid — Diagram Rendering

  Renders Mermaid diagrams to SVG or ASCII using beautiful-mermaid.
  Source: repos/public/pretty-mermaid-skills/

  ## Commands

  ### Render single diagram
  ```bash
  node workers/public/pretty-mermaid/scripts/render.mjs \
    --input diagram.mmd --output diagram.svg --theme tokyo-night
  ```

  ### ASCII (terminal-friendly)
  ```bash
  node workers/public/pretty-mermaid/scripts/render.mjs \
    --input diagram.mmd --format ascii --use-ascii
  ```

  ### Batch render
  ```bash
  node workers/public/pretty-mermaid/scripts/batch.mjs \
    --input-dir ./diagrams --output-dir ./output --theme dracula --workers 4
  ```

  ### List themes
  ```bash
  node workers/public/pretty-mermaid/scripts/themes.mjs
  ```

  ## Themes (14)
  Light: github-light, catppuccin-latte, tokyo-night-light, nord-light, solarized-light
  Dark: zinc-dark, tokyo-night, tokyo-night-storm, catppuccin-mocha, nord, dracula, github-dark, solarized-dark, one-dark

  ## Diagram Types
  flowchart, sequence, state, class, er
  Templates in: workers/public/pretty-mermaid/assets/example_diagrams/

  ## Workflow
  1. User provides Mermaid syntax or describes diagram need
  2. Create .mmd file (use templates from assets/example_diagrams/ as starting point)
  3. Render with chosen theme
  4. Deliver SVG or ASCII output
