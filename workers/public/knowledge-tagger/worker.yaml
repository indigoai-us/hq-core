worker:
  id: knowledge-tagger
  name: "Knowledge Tagger"
  type: OpsWorker
  version: "1.0"

execution:
  mode: on_demand
  max_runtime: 60m
  retry_attempts: 0
  model: opus

context:
  base:
    - knowledge/public/hq-core/knowledge-ontology.yaml
    - workers/public/knowledge-tagger/
  exclude:
    - node_modules/
    - "*.log"

verification:
  approval_required: false

output:
  destination: workspace/reports/knowledge-tagger/
  format: markdown
  naming: "{date}-tag-report.md"

instructions: |
  # Knowledge Tagger Worker

  Auto-classify knowledge docs against the HQ ontology and prepend YAML frontmatter.

  ## Skills

  | Skill | Description |
  |-------|-------------|
  | tag-docs | Tag all docs in a knowledge base |
  | retag | Re-tag a single doc or directory |

  ## Ontology

  Read schema from `knowledge/public/hq-core/knowledge-ontology.yaml`. Dimensions:
  - `type` (single): strategy, reference, guide, analysis, brand, overview
  - `domain` (multi): product, engineering, data, brand, market, growth, operations
  - `status` (single): canonical, draft, stale
  - `tags` (free-form): 3-7 lowercase topic keywords
  - `relates_to` (paths): top 3 similar docs via qmd vsearch

  ## tag-docs

  Usage: `/run knowledge-tagger tag-docs --target companies/{co}/knowledge`

  Steps:
  1. Read ontology schema
  2. Glob `**/*.md` in target directory
  3. Skip INDEX.md, README.md (navigation, not content)
  4. For each doc:
     a. Read full content
     b. Classify type (single best fit)
     c. Classify domain(s) (1-3 most relevant)
     d. Assess status (canonical unless clearly draft/stale)
     e. Extract 3-7 topic tags (lowercase, kebab-case)
     f. Run `qmd vsearch "<title> <first-sentence>" -c {collection} -n 3`
        to find related docs for relates_to
     g. Prepend YAML frontmatter block (--- delimited)
     h. Preserve all existing content exactly
  5. Commit to knowledge repo: `cd {target} && git add -A && git commit -m "ontology: auto-tag knowledge docs"`

  ## retag

  Usage: `/run knowledge-tagger retag --target path/to/doc.md`

  Steps:
  1. Read ontology schema
  2. Read target doc
  3. If frontmatter exists, strip it
  4. Re-classify and prepend fresh frontmatter
  5. Commit change

  ## Classification Guidelines

  **type mapping:**
  - Has "how to", steps, instructions → guide
  - Has pricing, features, what-it-does → overview
  - Has competitive analysis, positioning, roadmap → strategy
  - Has API, schema, config, constants → reference
  - Has voice, tone, visual, brand → brand
  - Has metrics, benchmarks, case study, ROI → analysis

  **status mapping:**
  - Well-structured, comprehensive → canonical
  - Has TODOs, placeholders, "WIP" → draft
  - References outdated dates, deprecated tools → stale

  **tags rules:**
  - Lowercase, kebab-case (e.g., `edge-functions`, `app-store`)
  - 3-7 tags per doc
  - Prefer specific over generic (e.g., `supabase-auth` over `database`)
  - Include product names, technologies, concepts

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state
