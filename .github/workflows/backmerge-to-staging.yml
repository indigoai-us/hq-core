name: Backmerge to staging

# Reverse of promote-to-hq-core. On every push to indigoai-us/hq-core main,
# apply the files that push changed to indigoai-us/hq-core-staging main and
# commit them directly (no PR). This keeps staging in lock-step with anything
# that lands on hq-core main — release stamps, hotfixes, anything — with NO
# dependency on MIGRATION.md, a `## Release: TBD` marker, or release tags.
#
# Diff-based, not a full mirror: only the paths changed by the push are
# touched, so un-promoted staging work on other files is never clobbered. If
# applying the changes produces no net diff on staging, nothing is committed.
#
# The push to staging main works because the hq-audit-bot App is an
# always-bypass actor on staging's main_protect ruleset. The source checkout
# uses persist-credentials: false so its GITHUB_TOKEN auth header doesn't
# override the App token baked into the staging clone URL (see release.yml /
# auto-beta for the same extraheader gotcha).
#
# hq-core only: the file is promoted into hq-core verbatim, but the job-level
# guard keeps it inert on staging (and staging's own pushes are the promote
# direction, not the backmerge direction).
#
# Required secrets:
#   HQ_AUDIT_BOT_APP_ID
#   HQ_AUDIT_BOT_PRIVATE_KEY

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Serialize per ref so two rapid hq-core pushes don't race the staging push.
  group: backmerge-to-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backmerge:
    name: Backmerge hq-core main to staging
    if: github.repository == 'indigoai-us/hq-core'
    runs-on: ubuntu-latest
    env:
      HQ_AUDIT_BOT_APP_ID: ${{ secrets.HQ_AUDIT_BOT_APP_ID }}
      HQ_AUDIT_BOT_PRIVATE_KEY: ${{ secrets.HQ_AUDIT_BOT_PRIVATE_KEY }}
      STAGING_REPO: indigoai-us/hq-core-staging
    steps:
      - name: Fail fast if App credentials missing
        if: env.HQ_AUDIT_BOT_APP_ID == '' || env.HQ_AUDIT_BOT_PRIVATE_KEY == ''
        run: |
          echo "::error::HQ_AUDIT_BOT_APP_ID or HQ_AUDIT_BOT_PRIVATE_KEY not set."
          exit 1

      - name: Mint installation token for staging + this repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.HQ_AUDIT_BOT_APP_ID }}
          private-key: ${{ env.HQ_AUDIT_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            hq-core
            hq-core-staging

      - name: Checkout hq-core at the pushed commit (source)
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 0
          # Don't persist the GITHUB_TOKEN auth header globally — it would
          # override the App token in the staging clone URL on the push below.
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute files changed by this push
        id: changes
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          ZERO="0000000000000000000000000000000000000000"
          # Pick the diff range. For a normal push, before..after. For a new
          # branch / unknown before, fall back to the tip commit vs its parent.
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$ZERO" ] \
             || ! git -C source cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            RANGE="${AFTER}^ ${AFTER}"
          else
            RANGE="${BEFORE} ${AFTER}"
          fi
          echo "diff range: ${RANGE}"
          # --no-renames so renames surface as delete-old + add-new (simpler to
          # replay). Capture status<TAB>path lines.
          git -C source diff --no-renames --name-status ${RANGE} > /tmp/changes.tsv || true
          echo "----- changed files -----"
          cat /tmp/changes.tsv || true
          COUNT="$(wc -l < /tmp/changes.tsv | tr -d ' ')"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "after_short=${AFTER:0:8}" >> "$GITHUB_OUTPUT"

      - name: Clone hq-core-staging (target)
        if: steps.changes.outputs.count != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git clone --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${STAGING_REPO}.git" target
          cd target
          git config user.name  "hq-audit-bot[bot]"
          git config user.email "hq-audit-bot[bot]@users.noreply.github.com"

      - name: Apply changed files to staging
        if: steps.changes.outputs.count != '0'
        run: |
          set -euo pipefail
          # Staging-local trees that never come from hq-core — skip defensively
          # (hq-core shouldn't contain them, but never touch them just in case).
          is_local() {
            case "$1" in
              companies/*|personal/*|repos/*|workspace/*|.obsidian/*|.git/*) return 0 ;;
              *) return 1 ;;
            esac
          }
          while IFS=$'\t' read -r STATUS PATHNAME; do
            [ -z "${STATUS:-}" ] && continue
            if is_local "$PATHNAME"; then
              echo "skip (staging-local): $PATHNAME"
              continue
            fi
            case "$STATUS" in
              D)
                if [ -e "target/$PATHNAME" ]; then
                  rm -f "target/$PATHNAME"
                  echo "deleted: $PATHNAME"
                fi
                ;;
              *)
                if [ -f "source/$PATHNAME" ]; then
                  mkdir -p "$(dirname "target/$PATHNAME")"
                  cp "source/$PATHNAME" "target/$PATHNAME"
                  echo "applied: $PATHNAME"
                fi
                ;;
            esac
          done < /tmp/changes.tsv

      - name: Commit + push to staging main (only if changed)
        if: steps.changes.outputs.count != '0'
        env:
          AFTER_SHORT: ${{ steps.changes.outputs.after_short }}
        run: |
          set -euo pipefail
          cd target
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::Staging already matches hq-core for these files; nothing to commit."
            exit 0
          fi
          echo "----- staging diff to be committed -----"
          git --no-pager diff --cached --stat | tail -30
          git commit -m "chore(backmerge): sync hq-core main ${AFTER_SHORT} to staging"
          # origin carries the App token (clone URL) and the App is an
          # always-bypass actor on staging's main_protect ruleset, so this
          # pushes to main directly. No persisted extraheader (source checkout
          # used persist-credentials: false), so the App creds are honored.
          git push origin HEAD:refs/heads/main
          echo "::notice::Backmerged hq-core main ${AFTER_SHORT} to staging main."
