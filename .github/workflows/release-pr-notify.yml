name: Notify release PR opened

# When a release PR (title `release: v<ver>`) is opened on hq-core, post a
# heads-up to #hq-dev via the release-manager Slack bot so reviewers know a
# new release is waiting.
#
# hq-core only (release PRs are opened there by promote-to-hq-core.yml). The
# file is promoted into hq-core verbatim; the job guard keeps it inert on
# staging.
#
# Requires repo secret SLACK_BOT_TOKEN_RELEASE_MANAGER (the
# releasemanager_hq_bot xoxb token). The bot MUST be a member of #hq-dev.

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  notify:
    name: Post release-PR notice to #hq-dev
    if: |
      github.repository == 'indigoai-us/hq-core' &&
      startsWith(github.event.pull_request.title, 'release: v')
    runs-on: ubuntu-latest
    env:
      SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_RELEASE_MANAGER }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_NUM: ${{ github.event.pull_request.number }}
    steps:
      - name: Post to #hq-dev
        run: |
          set -euo pipefail
          if [ -z "${SLACK_TOKEN:-}" ]; then
            echo "::warning::SLACK_BOT_TOKEN_RELEASE_MANAGER not set; skipping Slack notify."
            exit 0
          fi
          TEXT=":rocket: *New release PR open for review* — <${PR_URL}|${PR_TITLE}> (#${PR_NUM}). Opened automatically by the promote pipeline. Reviews welcome!"
          RESP="$(curl -s -X POST \
            -H "Authorization: Bearer ${SLACK_TOKEN}" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$(jq -nc --arg c '#hq-dev' --arg t "$TEXT" '{channel:$c,text:$t,unfurl_links:false}')" \
            https://slack.com/api/chat.postMessage)"
          echo "$RESP" | jq '{ok,error}'
          if [ "$(echo "$RESP" | jq -r '.ok')" != "true" ]; then
            echo "::error::Slack post failed: $(echo "$RESP" | jq -r '.error // "unknown"') (is releasemanager_hq_bot a member of #hq-dev?)"
            exit 1
          fi
