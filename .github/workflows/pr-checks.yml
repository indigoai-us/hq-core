name: pr-checks

# Ports the /promote-hq-core local rule set to PR-time CI. Each job maps to
# a named HQ policy — failure annotations include the policy slug so the
# contributor can find the rule. See:
#   core/policies/hq-cmd-promote-hq-core-*.md (in HQ)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Mechanical checks (no LLM) ─────────────────────────────────────

  denylist-scan:
    name: denylist-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run denylist scan
        run: bash .leak-scan/scan.sh denylist

  policy-rationale-scan:
    name: policy-rationale-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run policy-rationale scan
        run: bash .leak-scan/scan.sh policy-rationale

  slug-scan:
    name: slug-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run private tenant slug scan
        run: bash .leak-scan/scan.sh slugs

  users-path-tripwire:
    name: users-path-tripwire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: /Users/ absolute-path tripwire
        run: bash .leak-scan/scan.sh users-path

  provenance-stripped:
    name: provenance-stripped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ## Provenance section must not be present
        run: bash .leak-scan/scan.sh provenance

  vendor-public-ok:
    name: vendor-public-ok
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Vendor-scoped policies need vendor_public_ok
        run: bash .leak-scan/scan.sh vendor-public-ok

  public-frontmatter-revalidate:
    name: public-frontmatter-revalidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Re-validate public:true frontmatter
        run: bash .leak-scan/scan.sh public-frontmatter

  denylist-drift:
    name: denylist-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Denylist must mirror HQ manifest snapshot
        run: bash .leak-scan/scan.sh denylist-drift

  settings-local-not-ignored:
    name: settings-local-not-ignored
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: .claude/settings.local.json must not be gitignored
        run: bash .leak-scan/scan.sh settings-local-not-ignored

  skill-command-refs:
    # DEV-1716: a core skill must not instruct a slash-command that isn't
    # resolvable on the install it is shown to. Engineering commands
    # (/run-project, /execute-task, ...) live in the separately-installed
    # hq-pack-engineering and must be allowlisted (+ referenced with their
    # install line), never presented as always-available. Catches FUTURE
    # dangling references, not just the originally-reported skills.
    name: skill-command-refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Core skills only instruct resolvable commands
        run: bash core/scripts/lint-skill-command-refs.sh

  install-deps:
    # DEV-1727: HQ's install/setup surface must not install or dependency-check
    # a third-party CLI that HQ itself never calls. The /setup wizard used to
    # `which vercel` + offer `npm install -g vercel`, gating setup on a tool
    # /deploy never uses (it targets hq-deploy). Denylist: core/scripts/
    # install-deps.deny. Catches FUTURE re-introductions, not just vercel.
    name: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install surface installs no user-provided deploy CLI
        run: bash core/scripts/lint-install-deps.sh
      - name: Regression test (fixture + live tree + fix present)
        run: bash core/scripts/tests/install-deps.test.sh

  git-mutation-guard:
    # DEV-1765: the HQ-root git-mutation guard must FIRE correctly under BOTH
    # harnesses. Under Codex the adapter used to resolve HQ_ROOT from the cwd's
    # git toplevel, which collapses into a nested repo (repos/*), missed the
    # gate, and exited 0 — silently allowing `cd <hq-root> && git push` from a
    # nested cwd. Claude side: block-hq-root-git-mutation.test.sh. Codex side:
    # codex-git-mutation-firing.test.sh (real adapter + gate + hook, no stubs).
    name: git-mutation-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude-harness git-mutation guard
        run: bash core/scripts/tests/block-hq-root-git-mutation.test.sh
      - name: Codex-harness git-mutation guard fires
        run: bash core/scripts/tests/codex-git-mutation-firing.test.sh

  auto-checkpoint-cmds:
    # Item 2: /brainstorm and /plan must auto-checkpoint at command end so users
    # do not have to manually /handoff before a fresh session. Structural guard.
    name: auto-checkpoint-cmds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Planning commands auto-checkpoint on completion
        run: bash core/scripts/tests/auto-checkpoint-planning-cmds.test.sh

  auto-acl-share-hooks:
    name: auto-acl-share-hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detector smoke test
        run: bash core/scripts/tests/auto-acl-suggest.test.sh
      - name: Stop reminder smoke test
        run: bash core/scripts/tests/auto-acl-share-reminder.test.sh
      - name: Hooks parse + no bash-3.2 nested-heredoc (DEV-1513f1f5)
        run: bash core/scripts/tests/hooks-heredoc-syntax.test.sh

  # ─── Label-gated checks ────────────────────────────────────────────
  # These read PR labels to allow intentional overrides.

  commands-skills-tripwire:
    name: commands-skills-tripwire
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: commands/skills require manual-copy label
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, '\n') }}
        run: bash .leak-scan/scan.sh commands-skills-tripwire

  core-yaml-locked:
    name: core-yaml-locked
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: core/core.yaml hqVersion requires version-bump label
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, '\n') }}
        run: bash .leak-scan/scan.sh core-yaml-locked

  core-yaml-version-monotonic:
    # hq-core ONLY. Promote PRs (the only kind hq-core sees) always bump
    # core/core.yaml hqVersion via promote-to-hq-core.yml; this check enforces
    # that the bump is strictly greater than origin/main. Staging is exempt —
    # staging churns intra-version without bumping hqVersion.
    name: core-yaml-version-monotonic
    if: github.event_name == 'pull_request' && github.repository == 'indigoai-us/hq-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: core/core.yaml hqVersion must strictly increase
        run: bash .leak-scan/scan.sh core-yaml-version-monotonic

  special-case-files:
    name: special-case-files
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CHANGELOG/MIGRATION/CLAUDE.md require special-case-confirmed
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, '\n') }}
        run: bash .leak-scan/scan.sh special-case-files

  # ─── Codex-augmented semantic check ────────────────────────────────
  # Per-file PASS/EDIT/DROP rubric, mirroring /promote-hq-core Phase 3.
  # Dynamic matrix over changed policy files; capped at 10 in parallel
  # to match the local batching rule.

  collect-policy-changes:
    name: collect-policy-changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
      count: ${{ steps.collect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: collect
        name: List changed core/policies/*.md files
        run: |
          set -euo pipefail
          base="${{ github.base_ref }}"
          git fetch origin "$base" --depth=1
          mapfile -t changed < <(git diff --name-only --diff-filter=AM "origin/$base"...HEAD \
            | grep -E '^\core/policies/[^/]+\.md$' || true)
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "files=[]" >> "$GITHUB_OUTPUT"
            echo "count=0"  >> "$GITHUB_OUTPUT"
          else
            json="$(printf '%s\n' "${changed[@]}" | jq -R . | jq -sc .)"
            echo "files=$json" >> "$GITHUB_OUTPUT"
            echo "count=${#changed[@]}" >> "$GITHUB_OUTPUT"
          fi

  codex-pii-rubric:
    name: codex-pii-rubric
    needs: collect-policy-changes
    if: |
      github.event_name == 'pull_request' &&
      needs.collect-policy-changes.outputs.count != '0' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-codex-rubric')
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.collect-policy-changes.outputs.files) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install codex CLI
        run: npm i -g @openai/codex
      - name: Run rubric on ${{ matrix.file }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: gpt-5
        run: |
          set -euo pipefail
          out="$(bash .leak-scan/codex-rubric.sh "${{ matrix.file }}")"
          echo "$out"
          # Append to job summary so reviewers see verdicts collated
          {
            echo "## Rubric: ${{ matrix.file }}"
            echo '```json'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
