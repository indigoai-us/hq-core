name: pr-checks

# Ports the /promote-hq-core local rule set to PR-time CI. Each job maps to
# a named HQ policy — failure annotations include the policy slug so the
# contributor can find the rule. See:
#   core/policies/hq-cmd-promote-hq-core-*.md (in HQ)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Mechanical checks (no LLM) ─────────────────────────────────────

  denylist-scan:
    name: denylist-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run denylist scan
        run: bash .leak-scan/scan.sh denylist

  policy-rationale-scan:
    name: policy-rationale-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run policy-rationale scan
        run: bash .leak-scan/scan.sh policy-rationale

  slug-scan:
    name: slug-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run private tenant slug scan
        run: bash .leak-scan/scan.sh slugs

  users-path-tripwire:
    name: users-path-tripwire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: /Users/ absolute-path tripwire
        run: bash .leak-scan/scan.sh users-path

  provenance-stripped:
    name: provenance-stripped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ## Provenance section must not be present
        run: bash .leak-scan/scan.sh provenance

  vendor-public-ok:
    name: vendor-public-ok
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Vendor-scoped policies need vendor_public_ok
        run: bash .leak-scan/scan.sh vendor-public-ok

  public-frontmatter-revalidate:
    name: public-frontmatter-revalidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Re-validate public:true frontmatter
        run: bash .leak-scan/scan.sh public-frontmatter

  denylist-drift:
    name: denylist-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Denylist must mirror HQ manifest snapshot
        run: bash .leak-scan/scan.sh denylist-drift

  settings-local-not-ignored:
    name: settings-local-not-ignored
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: .claude/settings.local.json must not be gitignored
        run: bash .leak-scan/scan.sh settings-local-not-ignored

  # ─── Label-gated checks ────────────────────────────────────────────
  # These read PR labels to allow intentional overrides.

  commands-skills-tripwire:
    name: commands-skills-tripwire
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: commands/skills require manual-copy label
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, '\n') }}
        run: bash .leak-scan/scan.sh commands-skills-tripwire

  core-yaml-locked:
    name: core-yaml-locked
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: core/core.yaml hqVersion requires version-bump label
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, '\n') }}
        run: bash .leak-scan/scan.sh core-yaml-locked

  special-case-files:
    name: special-case-files
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CHANGELOG/MIGRATION/CLAUDE.md require special-case-confirmed
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, '\n') }}
        run: bash .leak-scan/scan.sh special-case-files

  migration-md-with-tbd:
    name: migration-md-with-tbd
    if: |
      github.event_name == 'pull_request' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-migration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "MIGRATION.md must change and include the Release-TBD marker"
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # Canonical location; the root MIGRATION.md is a symlink.
          MIG="core/docs/hq/MIGRATION.md"

          # hq-core only sees promote PRs (bulk staging→hq-core rsync), so
          # "file must change in this PR" carries no human signal — every
          # promote changes the file by construction. The thing that
          # matters here is that the TBD marker is present so release.yml
          # can substitute the version on tag push. Staging keeps the full
          # "file changed AND added section includes TBD" rule below.
          if [ "${GITHUB_REPOSITORY:-}" = "indigoai-us/hq-core" ]; then
            if grep -qE '^##[[:space:]]+Release:[[:space:]]+TBD' "$MIG"; then
              echo "✓ ${MIG} contains '## Release: TBD' marker"
              exit 0
            fi
            echo "::error file=${MIG}::${MIG} is missing the '## Release: TBD' header. release.yml needs it as a placeholder to substitute on tag push."
            exit 1
          fi

          # Fetch base ref without forcing a shallow depth. A shallow
          # `--depth=1` fetch combined with the PR branch's full history
          # (from checkout@v4 fetch-depth: 0) leaves no common ancestor
          # for `git diff A...B` to find, so the three-dot diff errors
          # out with "no merge base" and the `|| true` below silently
          # turns the error into an empty ADDED string.
          git fetch origin "$BASE_REF"
          # Two-dot diff: just "what HEAD has that origin/${BASE_REF}
          # does not". Three-dot would be more precise (changes on this
          # branch's history only) but requires a reachable merge-base,
          # which is fragile in CI checkouts. Two-dot is sufficient for
          # the TBD-marker check.
          if ! git diff --quiet "origin/${BASE_REF}..HEAD" -- "$MIG"; then
            # File was modified. Verify added lines include the TBD marker.
            ADDED="$(git diff --no-color "origin/${BASE_REF}..HEAD" -- "$MIG" \
              | grep -E '^[+]' | grep -v '^[+][+][+]' || true)"
            if printf '%s\n' "$ADDED" | grep -qE '^[+]##[[:space:]]+Release:[[:space:]]+TBD'; then
              echo "✓ MIGRATION.md changed and includes '## Release: TBD' marker"
              exit 0
            fi
            echo "::error file=${MIG}::MIGRATION.md was changed but the added section is missing the '## Release: TBD' header. Use it as a placeholder — release.yml will swap it to the actual version on tag push."
            exit 1
          fi
          echo "::error file=${MIG}::MIGRATION.md must be updated on every PR. Add a '## Release: TBD' section describing the migration impact, or apply the 'skip-migration' label if this PR truly has no migration impact."
          exit 1

  # ─── Codex-augmented semantic check ────────────────────────────────
  # Per-file PASS/EDIT/DROP rubric, mirroring /promote-hq-core Phase 3.
  # Dynamic matrix over changed policy files; capped at 10 in parallel
  # to match the local batching rule.

  collect-policy-changes:
    name: collect-policy-changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
      count: ${{ steps.collect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: collect
        name: List changed core/policies/*.md files
        run: |
          set -euo pipefail
          base="${{ github.base_ref }}"
          git fetch origin "$base" --depth=1
          mapfile -t changed < <(git diff --name-only --diff-filter=AM "origin/$base"...HEAD \
            | grep -E '^\core/policies/[^/]+\.md$' \
            | grep -v '/_digest\.md$' || true)
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "files=[]" >> "$GITHUB_OUTPUT"
            echo "count=0"  >> "$GITHUB_OUTPUT"
          else
            json="$(printf '%s\n' "${changed[@]}" | jq -R . | jq -sc .)"
            echo "files=$json" >> "$GITHUB_OUTPUT"
            echo "count=${#changed[@]}" >> "$GITHUB_OUTPUT"
          fi

  codex-pii-rubric:
    name: codex-pii-rubric
    needs: collect-policy-changes
    if: |
      github.event_name == 'pull_request' &&
      needs.collect-policy-changes.outputs.count != '0' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-codex-rubric')
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.collect-policy-changes.outputs.files) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install codex CLI
        run: npm i -g @openai/codex
      - name: Run rubric on ${{ matrix.file }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: gpt-5
        run: |
          set -euo pipefail
          out="$(bash .leak-scan/codex-rubric.sh "${{ matrix.file }}")"
          echo "$out"
          # Append to job summary so reviewers see verdicts collated
          {
            echo "## Rubric: ${{ matrix.file }}"
            echo '```json'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
