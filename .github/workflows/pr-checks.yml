name: pr-checks

# Ports the /promote-hq-core local rule set to PR-time CI. Each job maps to
# a named HQ policy — failure annotations include the policy slug so the
# contributor can find the rule. See:
#   core/policies/hq-cmd-promote-hq-core-*.md (in HQ)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Mechanical checks (no LLM) ─────────────────────────────────────

  denylist-scan:
    name: denylist-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run denylist scan
        run: bash .leak-scan/scan.sh denylist

  policy-rationale-scan:
    name: policy-rationale-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run policy-rationale scan
        run: bash .leak-scan/scan.sh policy-rationale

  slug-scan:
    name: slug-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run private tenant slug scan
        run: bash .leak-scan/scan.sh slugs

  users-path-tripwire:
    name: users-path-tripwire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: /Users/ absolute-path tripwire
        run: bash .leak-scan/scan.sh users-path

  provenance-stripped:
    name: provenance-stripped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ## Provenance section must not be present
        run: bash .leak-scan/scan.sh provenance

  vendor-public-ok:
    name: vendor-public-ok
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Vendor-scoped policies need vendor_public_ok
        run: bash .leak-scan/scan.sh vendor-public-ok

  public-frontmatter-revalidate:
    name: public-frontmatter-revalidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Re-validate public:true frontmatter
        run: bash .leak-scan/scan.sh public-frontmatter

  denylist-drift:
    name: denylist-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Denylist must mirror HQ manifest snapshot
        run: bash .leak-scan/scan.sh denylist-drift

  settings-local-not-ignored:
    name: settings-local-not-ignored
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: .claude/settings.local.json must not be gitignored
        run: bash .leak-scan/scan.sh settings-local-not-ignored

  repos-segment-not-ignored:
    name: repos-segment-not-ignored
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: nested knowledge/repos/ must sync; only top-level repos/ excluded (DEV-1791)
        run: bash .leak-scan/scan.sh repos-segment-not-ignored

  skill-command-refs:
    # DEV-1716: a core skill must not instruct a slash-command that isn't
    # resolvable on the install it is shown to. Engineering commands
    # (/run-project, /execute-task, ...) live in the separately-installed
    # hq-pack-engineering and must be allowlisted (+ referenced with their
    # install line), never presented as always-available. Catches FUTURE
    # dangling references, not just the originally-reported skills.
    name: skill-command-refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Core skills only instruct resolvable commands
        run: bash core/scripts/lint-skill-command-refs.sh

  skill-script-refs:
    # WC-17: a skill must not retain a path to a shell script removed with a
    # retired workflow; commands and local script references are both released
    # guidance that must resolve on a fresh scaffold.
    name: skill-script-refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Core skills only reference shipped local shell scripts
        run: bash core/scripts/lint-skill-script-refs.sh learn
      - name: Regression test (fixture + live tree + WC-17 fix)
        run: bash core/scripts/tests/skill-script-refs.test.sh

  install-deps:
    # DEV-1727: HQ's install/setup surface must not install or dependency-check
    # a third-party CLI that HQ itself never calls. The /setup wizard used to
    # `which vercel` + offer `npm install -g vercel`, gating setup on a tool
    # /deploy never uses (it targets hq-deploy). Denylist: core/scripts/
    # install-deps.deny. Catches FUTURE re-introductions, not just vercel.
    name: install-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install surface installs no user-provided deploy CLI
        run: bash core/scripts/lint-install-deps.sh
      - name: Regression test (fixture + live tree + fix present)
        run: bash core/scripts/tests/install-deps.test.sh

  # Installer→Claude PATH gap: the template must not hardcode env.PATH, and
  # the setup.sh snapshot must include the native installer's managed
  # toolchain dirs even when the session PATH is missing them (GUI-launched
  # Claude never sources the shell-profile block that wires them in).
  # US-001: canonical YAML-backed validation for shipped skill metadata and
  # generated agents/openai.yaml contracts.
  agent-runtime-skill-metadata:
    name: agent-runtime-skill-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned YAML parser for skill metadata contracts
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/agent-runtime-parser"
          node core/scripts/validate-agent-runtime-contracts.mjs install-parser --install-dir "$install_dir"
          echo "HQ_AGENT_RUNTIME_PARSER_ROOT=$install_dir" >> "$GITHUB_ENV"
      - name: Validate shipped skill metadata + openai.yaml
        run: node core/scripts/validate-agent-runtime-contracts.mjs
      - name: Skill metadata regression test
        run: bash core/scripts/tests/agent-runtime-skill-metadata.test.sh
      - name: Validate concrete shipped skill command permissions
        run: node core/scripts/validate-agent-runtime-contracts.mjs validate-permissions
      - name: Skill command permission regression test
        run: bash core/scripts/tests/agent-runtime-permissions.test.sh
      - name: Install ShellCheck for cross-runtime shell contracts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: ShellCheck cross-runtime adapters and fixtures
        run: |
          shellcheck -S warning \
            core/scripts/hook-lib.sh \
            core/scripts/lint-shell-portability.sh \
            core/scripts/tests/agent-runtime-skill-metadata.test.sh \
            core/scripts/tests/agent-runtime-permissions.test.sh \
            core/scripts/tests/hook-runtime-diagnostics.test.sh \
            core/scripts/tests/agent-runtime-contracts-e2e.test.sh \
            .claude/hooks/hook-gate.sh \
            .claude/hooks/check-claude-desktop-bridge-health.sh \
            .codex/hooks/hq-codex-hook-adapter.sh \
            .grok/hooks/hq-grok-hook-adapter.sh
      - name: Claude Codex Grok Cowork runtime contract matrix
        run: bash core/scripts/tests/agent-runtime-contracts-e2e.test.sh

  compose-settings-path:
    name: compose-settings-path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: settings.json PATH snapshot composition
        run: bash core/scripts/tests/compose-settings-path.test.sh

  # feedback_3cdd3064: deploy-summary.sh aborted under set -u when HQ_DEPLOY_API was unset.
  deploy-summary-nounset:
    name: deploy-summary-nounset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy-summary.sh tolerates unset HQ_DEPLOY_API under set -u
        run: bash core/scripts/tests/deploy-summary-nounset.test.sh

  # task-3517155514: /deploy must always resolve a non-empty API base (public
  # default https://api.indigo-hq.com) so a fresh install does not stall at Phase C.
  resolve-deploy-api:
    name: resolve-deploy-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy API base always resolves (public-default fallback)
        run: bash core/scripts/tests/resolve-deploy-api.test.sh

  # task-2854627137: /deploy org resolution must work for AGENT callers (agt_),
  # not just humans — else an agent's company deploy silently downgrades to personal.
  resolve-deploy-org:
    name: resolve-deploy-org
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy org resolves for agent + human callers (via /membership/me)
        run: bash core/scripts/tests/resolve-deploy-org.test.sh

  # US-001: /deploy identity-resolve portable USER key + TMPDIR lock (#357 regression).
  identity-resolve:
    name: identity-resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: identity-resolve USER/USERNAME lock path
        run: bash .claude/skills/deploy/scripts/tests/identity-resolve.test.sh

  # US-001: identity-resolve jq→node fallback; missing engines → missing_dependency not login_required.
  identity-resolve-missing-jq:
    name: identity-resolve-missing-jq
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: identity-resolve node fallback + missing_dependency
        run: bash .claude/skills/deploy/scripts/tests/identity-resolve-missing-jq.test.sh

  # US-002: shared OS portability helpers (stat/sed/tmp/user/require_jq).
  portable-lib:
    name: portable-lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: portable.sh helpers
        run: bash core/scripts/tests/portable-lib.test.sh

  # feedback_1b307a08: nested manifests were misparsed by a flat col-0 regex.
  manifest-nested-parse:
    name: manifest-nested-parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Nested company manifest parsing
        run: bash core/scripts/tests/manifest-nested-parse.test.sh

  # feedback_c930eafe: catch stale org chart drift between README teams and person ontology.
  ontology-readme-drift:
    name: ontology-readme-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: README team table matches person ontology
        run: bash core/scripts/tests/ontology-readme-drift.test.sh

  git-mutation-guard:
    # DEV-1765: the HQ-root git-mutation guard must FIRE correctly under BOTH
    # harnesses. Under Codex the adapter used to resolve HQ_ROOT from the cwd's
    # git toplevel, which collapses into a nested repo (repos/*), missed the
    # gate, and exited 0 — silently allowing `cd <hq-root> && git push` from a
    # nested cwd. Claude side: block-hq-root-git-mutation.test.sh. Codex side:
    # codex-git-mutation-firing.test.sh (real adapter + gate + hook, no stubs).
    name: git-mutation-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude-harness git-mutation guard
        run: bash core/scripts/tests/block-hq-root-git-mutation.test.sh
      - name: Codex-harness git-mutation guard fires
        run: bash core/scripts/tests/codex-git-mutation-firing.test.sh

  journal-session-isolation:
    name: journal-session-isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Session-scoped journal pointers and ownership validation
        run: bash core/scripts/tests/journal-session-scoped-pointer.test.sh
      - name: Stop hook selects only its session journal
        run: bash core/scripts/tests/after-turn-suggestions.test.sh

  reindex-path-gate:
    # Path-gated reindex hook: `hq reindex` must run ONLY when a skill, worker,
    # or personal-overlay entry (knowledge/policies/settings) is created,
    # edited, or deleted — not on every turn/prompt/session. Guards the gate in
    # .claude/hooks/reindex.sh against regressions.
    name: reindex-path-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reindex hook fires only on relevant file changes
        run: bash core/scripts/tests/reindex-path-gate.test.sh

  rebuild-threads-index:
    # Changeset sidecars share the T-*.json prefix but must never consume
    # INDEX.md rows or recent.md's 15-thread limit.
    name: rebuild-threads-index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Index primary thread records only
        run: bash core/scripts/tests/rebuild-threads-index.test.sh

  auto-checkpoint-cmds:
    # Item 2: /brainstorm and /plan must auto-checkpoint at command end so users
    # do not have to manually /handoff before a fresh session. Structural guard.
    name: auto-checkpoint-cmds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Planning commands auto-checkpoint on completion
        run: bash core/scripts/tests/auto-checkpoint-planning-cmds.test.sh

  knowledge-repo-glob-shells:
    # knowledge-repo-loop-zsh-unmatched-glob: the checkpoint and cleanup
    # snippets must not let zsh NOMATCH abort on an empty knowledge directory.
    name: knowledge-repo-glob-shells
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh for NOMATCH regression coverage
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Knowledge repository glob expansion is shell-safe
        run: bash core/scripts/tests/knowledge-repo-glob-shells.test.sh

  dm-people-resolve:
    # feature-dm-skill-email-confirm: the /dm skill must CONFIRM a recipient's
    # email via `hq people resolve` (single-company, tenancy-safe) before
    # sending — never send to an unconfirmed name. Structural guard over the
    # dm SKILL.md instruction contract.
    name: dm-people-resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: /dm confirms recipient email via hq people resolve before sending
        run: bash core/scripts/tests/dm-people-resolve-integration.test.sh

  auto-acl-share-hooks:
    name: auto-acl-share-hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detector smoke test
        run: bash core/scripts/tests/auto-acl-suggest.test.sh
      - name: Stop reminder smoke test
        run: bash core/scripts/tests/auto-acl-share-reminder.test.sh
      - name: Hooks parse + no bash-3.2 nested-heredoc (DEV-1513f1f5)
        run: bash core/scripts/tests/hooks-heredoc-syntax.test.sh
      - name: Supply-chain guard bypass is env-only, not inline prefix (DEV-1798)
        run: bash core/scripts/tests/block-unsafe-package-install.test.sh
      - name: Workers-registry quarantine semantics + pack-sourced remedy (DEV-1718, DEV-1796)
        run: bash core/scripts/tests/generate-workers-registry.test.sh

  core-write-protection:
    name: core-write-protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hook-gate self-heals a non-executable (sync-stripped) hook
        run: bash core/scripts/tests/hook-gate-exec-bit.test.sh
      - name: Runtime adapters repair hooks or emit bounded diagnostics
        run: bash core/scripts/tests/hook-runtime-diagnostics.test.sh
      - name: hook-gate augments PATH for version-manager node (nvm/volta/fnm/asdf)
        run: bash core/scripts/tests/hook-gate-path-augment.test.sh
      - name: All tracked .sh files are mode 100755 in the git index (US-004)
        run: bash core/scripts/tests/exec-bit-all-scripts.test.sh
      - name: block-core-writes-bash exempts repos/ checkouts, still guards live root
        run: bash core/scripts/tests/block-core-writes-repos-exempt.test.sh
      - name: block-core-writes-bash target-aware write detection
        run: bash core/scripts/tests/block-core-writes-bash.test.sh

  # US-005: shell portability lint + shellcheck + cross-platform smoke.
  shell-portability:
    name: shell-portability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lint-shell-portability
        run: bash core/scripts/lint-shell-portability.sh
      - name: lint-shell-portability regression test
        run: bash core/scripts/tests/lint-shell-portability.test.sh
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: shellcheck portability surface (warning; this-PR shell paths)
        run: |
          set -euo pipefail
          # Scope to the cross-platform surface introduced/touched by this work.
          # Full-tree shellcheck is a separate burn-down (pre-existing SC noise).
          files=(
            core/scripts/lib/portable.sh
            core/scripts/lint-shell-portability.sh
            core/scripts/rebuild-threads-index.sh
            core/scripts/tests/rebuild-threads-index.test.sh
            core/scripts/setup.sh
            core/scripts/repo-run-registry.sh
            core/scripts/rebuild-social-drafts-index.sh
            core/scripts/audit-log.sh
            .claude/hooks/hook-gate.sh
            .claude/skills/deploy/scripts/identity-resolve.sh
            .claude/skills/deploy/scripts/password-helper.sh
            .claude/skills/deploy/scripts/resolve-deploy-org.sh
          )
          present=()
          for f in "${files[@]}"; do
            [ -f "$f" ] && present+=("$f")
          done
          echo "shellcheck ${#present[@]} files"
          shellcheck -S warning "${present[@]}"

  shell-smoke-windows:
    name: shell-smoke-windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: portable-lib
        run: bash core/scripts/tests/portable-lib.test.sh
      - name: identity-resolve USER key
        run: bash .claude/skills/deploy/scripts/tests/identity-resolve.test.sh
      - name: identity-resolve missing engines
        run: bash .claude/skills/deploy/scripts/tests/identity-resolve-missing-jq.test.sh
      - name: exec-bit index
        run: bash core/scripts/tests/exec-bit-all-scripts.test.sh
      - name: hook-gate path augment
        run: bash core/scripts/tests/hook-gate-path-augment.test.sh
      - name: hook-gate exec-bit self-heal
        run: bash core/scripts/tests/hook-gate-exec-bit.test.sh
      - name: install pinned YAML parser for agent runtime contracts
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/agent-runtime-parser"
          node core/scripts/validate-agent-runtime-contracts.mjs install-parser --install-dir "$install_dir"
          echo "HQ_AGENT_RUNTIME_PARSER_ROOT=$install_dir" >> "$GITHUB_ENV"
      - name: validate shipped skill metadata + openai.yaml
        run: node core/scripts/validate-agent-runtime-contracts.mjs

  shell-smoke-macos:
    name: shell-smoke-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: portable-lib
        run: bash core/scripts/tests/portable-lib.test.sh
      - name: identity-resolve USER key
        run: bash .claude/skills/deploy/scripts/tests/identity-resolve.test.sh
      - name: identity-resolve missing engines
        run: bash .claude/skills/deploy/scripts/tests/identity-resolve-missing-jq.test.sh
      - name: exec-bit index
        run: bash core/scripts/tests/exec-bit-all-scripts.test.sh
      - name: hook-gate path augment
        run: bash core/scripts/tests/hook-gate-path-augment.test.sh
      - name: hook-gate exec-bit self-heal
        run: bash core/scripts/tests/hook-gate-exec-bit.test.sh

  hooks-no-python:
    # HQ's runtime hook layer must not depend on python3 (Windows machines
    # often have none — or the Store alias stub that resolves on PATH but
    # cannot run). Tripwire (no python3 invocations in runtime hooks/scripts),
    # hook-lib engine parity (jq vs node), and broken-python3 runtime proof
    # for policy injection + the frontmatter validator.
    name: hooks-no-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hooks run python-free (tripwire + parity + broken-stub runtime)
        run: bash core/scripts/tests/hooks-no-python.test.sh
  prefer-native-capabilities:
    # hq-prefer-native-capabilities must inject at session start (always-on
    # baseline) and on canvas/share/secret prompts, stay untruncated in the
    # policy-reminder, and pass frontmatter validation (US-001).
    name: prefer-native-capabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Policy fires on SessionStart + canvas prompt (trigger battery)
        run: bash core/scripts/tests/prefer-native-capabilities-trigger.test.sh
      - name: Codex preflight pull path emits the policy + Grok rules pointer
        run: bash core/scripts/tests/codex-preflight-policies.test.sh

  work-mesh-tests:
    # Wire the company-work-corpus hook suites explicitly without enabling
    # unrelated legacy scripts in the broader tests directory.
    name: work-mesh-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Work Mesh client-hook test scripts
        run: |
          set -euo pipefail
          shopt -s nullglob
          tests=(core/scripts/tests/work-mesh-*.test.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "no core/scripts/tests/work-mesh-*.test.sh found" >&2
            exit 1
          fi
          for t in "${tests[@]}"; do
            echo "=== $t ==="
            bash "$t"
          done

  work-mesh-v2:
    name: work-mesh-v2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Work Mesh watcher unit contract
        run: node --test core/scripts/__tests__/work-mesh.test.mjs
      - name: Work Mesh watcher US-011 acceptance
        run: node --test test/__tests__/stories/US-011.test.mjs
      - name: Work Mesh helper compatibility smoke
        run: bash core/scripts/tests/work-mesh-helper.test.sh

  # ─── Label-gated checks ────────────────────────────────────────────
  core-yaml-version-monotonic:
    # hq-core ONLY. Promote PRs (the only kind hq-core sees) always bump
    # core/core.yaml hqVersion via promote-to-hq-core.yml; this check enforces
    # that the bump is strictly greater than origin/main. Staging is exempt —
    # staging churns intra-version without bumping hqVersion.
    name: core-yaml-version-monotonic
    if: github.event_name == 'pull_request' && github.repository == 'indigoai-us/hq-core'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: core/core.yaml hqVersion must strictly increase
        run: bash .leak-scan/scan.sh core-yaml-version-monotonic

  # ─── Codex-augmented semantic check ────────────────────────────────
  # Per-file PASS/EDIT/DROP rubric, mirroring /promote-hq-core Phase 3.
  # Dynamic matrix over changed policy files; capped at 10 in parallel
  # to match the local batching rule.

  collect-policy-changes:
    name: collect-policy-changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
      count: ${{ steps.collect.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: collect
        name: List changed core/policies/*.md files
        run: |
          set -euo pipefail
          base="${{ github.base_ref }}"
          git fetch origin "$base" --depth=1
          mapfile -t changed < <(git diff --name-only --diff-filter=AM "origin/$base"...HEAD \
            | grep -E '^\core/policies/[^/]+\.md$' || true)
          if [[ ${#changed[@]} -eq 0 ]]; then
            echo "files=[]" >> "$GITHUB_OUTPUT"
            echo "count=0"  >> "$GITHUB_OUTPUT"
          else
            json="$(printf '%s\n' "${changed[@]}" | jq -R . | jq -sc .)"
            echo "files=$json" >> "$GITHUB_OUTPUT"
            echo "count=${#changed[@]}" >> "$GITHUB_OUTPUT"
          fi

  codex-pii-rubric:
    name: codex-pii-rubric
    needs: collect-policy-changes
    if: |
      github.event_name == 'pull_request' &&
      needs.collect-policy-changes.outputs.count != '0' &&
      !contains(github.event.pull_request.labels.*.name, 'skip-codex-rubric')
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.collect-policy-changes.outputs.files) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install codex CLI
        run: npm i -g @openai/codex
      - name: Run rubric on ${{ matrix.file }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: gpt-5
        run: |
          set -euo pipefail
          out="$(bash .leak-scan/codex-rubric.sh "${{ matrix.file }}")"
          echo "$out"
          # Append to job summary so reviewers see verdicts collated
          {
            echo "## Rubric: ${{ matrix.file }}"
            echo '```json'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
