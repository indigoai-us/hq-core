name: Promote to hq-core

# Opens (or updates) a PR against indigoai-us/hq-core carrying the current
# staging tree. Two trigger modes:
#
#   1. push to main  (mode=auto)  — fires on every push to staging main.
#      Maintains ONE standing PR on a fixed branch (promote/auto-main).
#      Each push force-updates that branch with the latest staging tree, so
#      an already-open PR is "rebased" onto the new code rather than a new PR
#      being opened. Version follows a patch train: next = hq-core main
#      hqVersion + 1 patch (e.g. 15.0.4 -> 15.0.5). Auto-mode arms GitHub
#      auto-merge (squash) once required checks are green; apply the
#      `hold-release` label to disable auto-merge and skip re-arming.
#      Minor/major releases are still cut manually via workflow_dispatch with
#      an explicit version.
#
#   2. workflow_dispatch (mode=manual) — explicit release/v<ver> or fix/<slug>
#      PR with an operator-supplied version (unchanged from the original
#      behavior, including dry_run).
#
# Models the shape of past hq-core PRs:
#   - branch:  promote/auto-main (auto) | release/v<version> | fix/<slug>
#   - title:   release: v<version>   or   fix(core): <slug>
#   - labels:  version-bump, special-case-confirmed (release type)
#   - body:    ## Summary / ## Lineage note / ## Test plan
#
# Authentication: reuses the hq-audit-bot GitHub App. The App must be
# installed on indigoai-us/hq-core with Contents:write + Pull-requests:write.
# Required secrets on this repo (or org-level):
#   HQ_AUDIT_BOT_APP_ID       — App ID
#   HQ_AUDIT_BOT_PRIVATE_KEY  — PEM private key
#
# Tree sync: rsync from this repo into a fresh hq-core clone, excluding
# staging-local trees (companies/, personal/, repos/, workspace/, .obsidian/,
# .git/). The .github/ and .leak-scan/ directories ARE promoted — hq-core
# uses both. PII filtering (public: frontmatter, ## Provenance stripping) is
# NOT performed here; hq-core's pr-checks.yml is the gate that catches leaks.
#
# Security: every workflow_dispatch input and computed value is passed to
# run: blocks via env: rather than direct ${{ }} interpolation, so values
# cannot break out of the shell context. Manual inputs are regex-validated
# before any push/PR step runs.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without v-prefix (e.g. 14.1.3 or 14.1.3-beta.1)'
        required: true
        type: string
      pr_type:
        description: 'Release PR (release/v<ver>) or fix PR (fix/<slug>)'
        required: true
        type: choice
        default: release
        options:
          - release
          - fix
      slug:
        description: 'Slug for fix PRs (lowercase letters, digits, hyphens). Ignored for release.'
        required: false
        type: string
      extra_summary:
        description: 'Optional extra markdown to inject into the Summary section'
        required: false
        type: string
      dry_run:
        description: 'Print plan, do not push or open PR'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  # Serialize per ref. On rapid pushes the latest wins — it force-updates the
  # standing branch with the freshest staging tree, so cancelling an in-flight
  # run is safe (the next run re-syncs from scratch).
  group: promote-to-hq-core-${{ github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    name: Open PR on hq-core
    # Staging-only. This file is rsync'd verbatim into hq-core by the promote
    # itself; the guard keeps it inert there (a push to hq-core main must never
    # promote hq-core into itself).
    if: github.repository == 'indigoai-us/hq-core-staging'
    runs-on: ubuntu-latest
    env:
      HQ_AUDIT_BOT_APP_ID: ${{ secrets.HQ_AUDIT_BOT_APP_ID }}
      HQ_AUDIT_BOT_PRIVATE_KEY: ${{ secrets.HQ_AUDIT_BOT_PRIVATE_KEY }}
      TARGET_REPO: indigoai-us/hq-core
    steps:
      - name: Fail fast if App credentials missing
        if: env.HQ_AUDIT_BOT_APP_ID == '' || env.HQ_AUDIT_BOT_PRIVATE_KEY == ''
        run: |
          echo "::error::HQ_AUDIT_BOT_APP_ID or HQ_AUDIT_BOT_PRIVATE_KEY not set on this repo. Configure them, and ensure the App is installed on $TARGET_REPO with Contents:write + Pull-requests:write."
          exit 1

      - name: Validate manual inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TYPE: ${{ inputs.pr_type }}
          INPUT_SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$INPUT_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::version is not a valid semver"
            exit 1
          fi
          if [ "$INPUT_TYPE" = "fix" ]; then
            if [ -z "$INPUT_SLUG" ]; then
              echo "::error::slug is required when pr_type=fix"
              exit 1
            fi
            if ! printf '%s' "$INPUT_SLUG" | grep -Eq '^[a-z0-9][a-z0-9-]{0,63}$'; then
              echo "::error::slug must be lowercase letters/digits/hyphens (max 64 chars)"
              exit 1
            fi
          fi

      - name: Mint installation token for hq-core
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.HQ_AUDIT_BOT_APP_ID }}
          private-key: ${{ env.HQ_AUDIT_BOT_PRIVATE_KEY }}
          owner: indigoai-us
          repositories: |
            hq-core

      - name: Resolve parameters (auto vs manual)
        id: params
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TYPE: ${{ inputs.pr_type }}
          INPUT_SLUG: ${{ inputs.slug }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          if [ "$EVENT" = "push" ]; then
            # ── Auto mode: patch train off hq-core's current main hqVersion ──
            MODE="auto"
            PR_TYPE="release"
            DRY_RUN="false"
            BRANCH="promote/auto-main"
            CUR="$(gh api "repos/${TARGET_REPO}/contents/core/core.yaml" --jq '.content' \
              | base64 -d \
              | grep -E '^hqVersion:' | head -1 \
              | sed -E 's/^hqVersion:[[:space:]]*"?([0-9]+\.[0-9]+\.[0-9]+)"?.*/\1/')"
            if ! printf '%s' "$CUR" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Could not read a valid hqVersion from ${TARGET_REPO} core/core.yaml (got '${CUR}')."
              exit 1
            fi
            IFS=. read -r MA MI PA <<< "$CUR"
            VERSION="${MA}.${MI}.$((PA + 1))"
            TITLE="release: v${VERSION}"
            LABELS="version-bump,special-case-confirmed"
            COMMIT_MSG="release: v${VERSION}"
            echo "::notice::Auto-promote: hq-core main is ${CUR} → staging promotes as v${VERSION} on branch ${BRANCH}"
          else
            # ── Manual mode: operator-supplied version/slug ──
            MODE="manual"
            PR_TYPE="$INPUT_TYPE"
            DRY_RUN="$INPUT_DRY_RUN"
            VERSION="$INPUT_VERSION"
            if [ "$PR_TYPE" = "release" ]; then
              BRANCH="release/v${VERSION}"
              TITLE="release: v${VERSION}"
              LABELS="version-bump,special-case-confirmed"
              COMMIT_MSG="release: v${VERSION}"
            else
              BRANCH="fix/${INPUT_SLUG}"
              TITLE="fix(core): ${INPUT_SLUG}"
              # version-bump required: promote always bumps core.yaml hqVersion,
              # and hq-core's core-yaml-locked check requires the label whenever
              # hqVersion changes.
              LABELS="version-bump"
              COMMIT_MSG="fix(core): ${INPUT_SLUG}"
            fi
          fi

          {
            echo "mode=${MODE}"
            echo "pr_type=${PR_TYPE}"
            echo "version=${VERSION}"
            echo "dry_run=${DRY_RUN}"
            echo "branch=${BRANCH}"
            echo "title=${TITLE}"
            echo "labels=${LABELS}"
            echo "commit_msg=${COMMIT_MSG}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout staging (source)
        uses: actions/checkout@v4
        with:
          path: staging
          fetch-depth: 1

      - name: Capture staging SHA
        id: staging
        run: |
          SHA="$(git -C staging rev-parse HEAD)"
          SHORT="$(git -C staging rev-parse --short HEAD)"
          {
            echo "sha=${SHA}"
            echo "short=${SHORT}"
          } >> "$GITHUB_OUTPUT"

      - name: Clone hq-core (target)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.params.outputs.branch }}
        run: |
          set -euo pipefail
          git clone --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" target
          cd target
          git config user.name  "hq-audit-bot[bot]"
          git config user.email "hq-audit-bot[bot]@users.noreply.github.com"
          # -B: create or reset. For the standing auto branch this discards any
          # prior promote/auto-main content so the branch always reflects the
          # latest staging tree (force-pushed below).
          git checkout -B "$BRANCH"

      - name: Sync staging tree into hq-core
        run: |
          set -euo pipefail
          # NB: hq-core keeps its own .git from the clone — preserved because we
          # sync INTO target/ without --delete touching target/.git.
          # Excludes: staging-local trees that never belong in the public kit.
          rsync -a --delete \
            --exclude='.git/' \
            staging/ target/

      - name: Detect promotable changes (auto mode)
        id: realchanges
        # A release PR should ship actual scaffold content. Two kinds of diff do
        # NOT justify cutting a versioned release on their own:
        #   - core/core.yaml: auto-promote stamps the version bump into it below,
        #     so it ALWAYS differs (this caused empty `release: v<next>` PRs).
        #   - .github/workflows/**: CI/release plumbing, not shipped content.
        # If nothing else differs, skip the stamp/PR and close any stale standing
        # PR. (When real content DOES change, the rsync still carries any pending
        # workflow changes along into that PR — they just don't trigger one.)
        if: steps.params.outputs.mode == 'auto'
        run: |
          set -euo pipefail
          cd target
          git add -A
          REAL="$(git diff --cached --name-only \
            | grep -vx 'core/core.yaml' \
            | grep -vE '^\.github/workflows/' || true)"
          git reset -q
          if [ -z "$REAL" ]; then
            echo "::notice::No promotable changes beyond the version bump; skipping release PR."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "----- promotable files -----"
            printf '%s\n' "$REAL"
          fi

      - name: Stamp hqVersion in target/core/core.yaml
        # Bumps core/core.yaml hqVersion + updatedAt to the resolved version so
        # the PR diff (and the squash-merge commit that becomes the tag target)
        # carries the new version.
        if: steps.realchanges.outputs.skip != 'true'
        env:
          INPUT_VERSION: ${{ steps.params.outputs.version }}
        run: |
          set -euo pipefail
          CORE_YAML="target/core/core.yaml"
          if [ ! -f "$CORE_YAML" ] || [ -L "$CORE_YAML" ]; then
            echo "::notice::No non-symlink ${CORE_YAML} found; skipping hqVersion stamp"
            exit 0
          fi
          if ! grep -qE '^hqVersion:' "$CORE_YAML"; then
            echo "::notice::No 'hqVersion:' key in ${CORE_YAML}; skipping stamp"
            exit 0
          fi
          NOW_ISO="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CURRENT=$(grep -E '^hqVersion:' "$CORE_YAML" | head -1 \
            | sed -E 's/^hqVersion:[[:space:]]*"?([0-9A-Za-z.+-]+)"?.*/\1/')
          if [ "$CURRENT" = "$INPUT_VERSION" ]; then
            echo "::notice::${CORE_YAML} already at hqVersion ${INPUT_VERSION}; skipping stamp"
            exit 0
          fi
          sed -E -i.bak \
            -e "s|^hqVersion:.*|hqVersion: \"${INPUT_VERSION}\"|" \
            -e "s|^updatedAt:.*|updatedAt: \"${NOW_ISO}\"|" \
            "$CORE_YAML"
          rm -f "${CORE_YAML}.bak"
          # If updatedAt key was absent, insert it right after hqVersion.
          if ! grep -qE '^updatedAt:' "$CORE_YAML"; then
            awk -v line="updatedAt: \"${NOW_ISO}\"" '{ print } /^hqVersion:/ && !done { print line; done=1 }' "$CORE_YAML" > "${CORE_YAML}.new"
            mv "${CORE_YAML}.new" "$CORE_YAML"
          fi
          echo "----- core/core.yaml diff -----"
          diff -u "staging/core/core.yaml" "$CORE_YAML" || true

      - name: Diff summary
        id: diff
        if: steps.realchanges.outputs.skip != 'true'
        run: |
          set -euo pipefail
          cd target
          git add -A
          CHANGED=$(git diff --cached --stat | tail -1 || echo "no changes")
          FILES=$(git diff --cached --name-only | wc -l)
          {
            echo "stat<<EOF"
            git diff --cached --stat | tail -20
            echo "EOF"
            echo "files=${FILES}"
          } >> "$GITHUB_OUTPUT"
          echo "----- diff stat -----"
          echo "$CHANGED"
          echo "$FILES files would change"

      - name: Handle no changes
        id: nochanges
        if: steps.diff.outputs.files == '0'
        run: |
          set -euo pipefail
          if [ "${{ steps.params.outputs.mode }}" = "auto" ]; then
            echo "::notice::No tree differences between staging and hq-core — nothing to promote on this push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No tree differences between staging and hq-core — nothing to promote."
            exit 1
          fi

      - name: Close stale standing PR (auto, no promotable changes)
        if: steps.params.outputs.mode == 'auto' && steps.realchanges.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.params.outputs.branch }}
        run: |
          set -euo pipefail
          EXISTING="$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING" ]; then
            gh pr close "$EXISTING" --repo "$TARGET_REPO" \
              --comment "Auto-closed by promote-to-hq-core: no promotable changes beyond the version bump." \
              --delete-branch
            echo "Closed stale standing PR #${EXISTING} and deleted ${BRANCH}."
          else
            echo "No open standing PR for ${BRANCH}; nothing to close."
          fi

      - name: Build PR body
        id: body
        if: steps.nochanges.outputs.skip != 'true' && steps.realchanges.outputs.skip != 'true'
        env:
          INPUT_VERSION: ${{ steps.params.outputs.version }}
          INPUT_TYPE: ${{ steps.params.outputs.pr_type }}
          INPUT_MODE: ${{ steps.params.outputs.mode }}
          INPUT_EXTRA: ${{ inputs.extra_summary }}
          STAGING_SHA: ${{ steps.staging.outputs.sha }}
          STAGING_SHORT: ${{ steps.staging.outputs.short }}
          DIFF_STAT: ${{ steps.diff.outputs.stat }}
          DIFF_FILES: ${{ steps.diff.outputs.files }}
        run: |
          set -euo pipefail
          BODY_FILE="$(mktemp)"
          if [ "$INPUT_TYPE" = "release" ]; then
            {
              echo "## Summary"
              echo "- Promotes \`hq-core-staging@${STAGING_SHORT}\` → \`hq-core\` for **v${INPUT_VERSION}**"
              echo "- ${DIFF_FILES} file(s) changed in this promotion"
            } > "$BODY_FILE"
          else
            {
              echo "## Summary"
              echo "- Promotes fix from \`hq-core-staging@${STAGING_SHORT}\` → \`hq-core\`"
              echo "- ${DIFF_FILES} file(s) changed in this promotion"
            } > "$BODY_FILE"
          fi
          if [ "$INPUT_MODE" = "auto" ]; then
            {
              echo "- 🤖 Auto-promote: this PR tracks staging \`main\` and is force-updated on every push."
              echo "- ✅ **Auto-merge on green** is armed (\`gh pr merge --auto --squash\`). Required checks must pass; red checks hold the PR indefinitely."
              echo "- 🛑 **Hold a release:** \`gh pr edit <N> --add-label hold-release\` (or apply the \`hold-release\` label in the UI). That disables auto-merge and skips re-arming on subsequent staging pushes."
            } >> "$BODY_FILE"
          fi
          if [ -n "${INPUT_EXTRA}" ]; then
            printf '\n%s\n' "${INPUT_EXTRA}" >> "$BODY_FILE"
          fi
          {
            echo
            echo "## Lineage note"
            echo "Opened automatically by \`promote-to-hq-core.yml\` from"
            echo "\`indigoai-us/hq-core-staging@${STAGING_SHA}\`."
            echo
            echo "<details><summary>Diff stat</summary>"
            echo
            echo '```'
            printf '%s\n' "${DIFF_STAT}"
            echo '```'
            echo "</details>"
          } >> "$BODY_FILE"
          if [ "$INPUT_TYPE" = "release" ]; then
            {
              echo
              echo "## Test plan"
              echo "- [ ] \`denylist-scan\` / \`provenance-stripped\` / \`public-frontmatter-revalidate\` pass on this PR"
              echo "- [ ] \`core-yaml-locked\` CI passes (label: \`version-bump\`)"
              echo "- [ ] \`special-case-files\` CI passes (label: \`special-case-confirmed\`)"
              echo "- [ ] After merge, tag \`v${INPUT_VERSION}\` on the squash commit"
              echo "- [ ] \`release.yml\` workflow runs and creates the GitHub release"
            } >> "$BODY_FILE"
          else
            {
              echo
              echo "## Test plan"
              echo "- [ ] \`denylist-scan\` / \`provenance-stripped\` / \`public-frontmatter-revalidate\` pass on this PR"
              echo "- [ ] Manual smoke test of the affected area"
            } >> "$BODY_FILE"
          fi
          echo "file=${BODY_FILE}" >> "$GITHUB_OUTPUT"
          echo "----- PR body preview -----"
          cat "$BODY_FILE"

      - name: Dry run — stop here
        if: steps.nochanges.outputs.skip != 'true' && steps.realchanges.outputs.skip != 'true' && steps.params.outputs.dry_run == 'true'
        env:
          BRANCH: ${{ steps.params.outputs.branch }}
        run: |
          echo "::notice::dry_run=true — branch '$BRANCH' built locally but NOT pushed; no PR opened."

      - name: Commit
        if: steps.nochanges.outputs.skip != 'true' && steps.realchanges.outputs.skip != 'true' && steps.params.outputs.dry_run != 'true'
        env:
          COMMIT_MSG: ${{ steps.params.outputs.commit_msg }}
        run: |
          set -euo pipefail
          cd target
          git commit -m "$COMMIT_MSG"

      - name: Push branch to hq-core
        if: steps.nochanges.outputs.skip != 'true' && steps.realchanges.outputs.skip != 'true' && steps.params.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.params.outputs.branch }}
          MODE: ${{ steps.params.outputs.mode }}
        run: |
          set -euo pipefail
          cd target
          if [ "$MODE" = "auto" ]; then
            # Force-update the standing branch so an already-open PR is rebased
            # onto the new staging tree instead of opening a fresh PR.
            git push --force --set-upstream origin "$BRANCH"
          else
            git push --set-upstream origin "$BRANCH"
          fi

      - name: Open PR on hq-core (if not already open)
        id: openpr
        if: steps.nochanges.outputs.skip != 'true' && steps.realchanges.outputs.skip != 'true' && steps.params.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.params.outputs.branch }}
          TITLE: ${{ steps.params.outputs.title }}
          LABELS: ${{ steps.params.outputs.labels }}
          BODY_FILE: ${{ steps.body.outputs.file }}
        run: |
          set -euo pipefail
          cd target
          EXISTING="$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #${EXISTING} already open for ${BRANCH}; the force-push updated it in place."
            echo "number=${EXISTING}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LABEL_ARGS=()
          if [ -n "$LABELS" ]; then
            IFS=',' read -ra LABEL_LIST <<< "$LABELS"
            for L in "${LABEL_LIST[@]}"; do
              LABEL_ARGS+=(--label "$L")
            done
          fi
          URL="$(gh pr create \
            --repo "$TARGET_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body-file "$BODY_FILE" \
            "${LABEL_ARGS[@]}")"
          NUM="$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          echo "number=${NUM}" >> "$GITHUB_OUTPUT"
          echo "::notice::Opened PR #${NUM}: ${URL}"

      # US-012: arm GitHub auto-merge (squash) on the standing auto-mode PR so
      # green required checks land without a multi-hour human gate. hold-release
      # label is the human opt-out (disable + skip re-arm).
      - name: Arm or hold auto-merge (auto mode)
        if: >-
          steps.params.outputs.mode == 'auto' &&
          steps.nochanges.outputs.skip != 'true' &&
          steps.realchanges.outputs.skip != 'true' &&
          steps.params.outputs.dry_run != 'true' &&
          steps.openpr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.openpr.outputs.number }}
        run: |
          set -euo pipefail
          LABELS="$(gh pr view "$PR_NUMBER" --repo "$TARGET_REPO" --json labels --jq '[.labels[].name] | join(",")')"
          if echo ",${LABELS}," | grep -q ',hold-release,'; then
            gh pr merge "$PR_NUMBER" --repo "$TARGET_REPO" --disable-auto || true
            echo "::notice::hold-release present on PR #${PR_NUMBER} — auto-merge disabled; not re-arming."
            exit 0
          fi
          # Queues until required checks are green; does not bypass red checks.
          if gh pr merge "$PR_NUMBER" --repo "$TARGET_REPO" --auto --squash; then
            echo "::notice::Auto-merge armed (squash) on PR #${PR_NUMBER}."
          else
            echo "::warning::Could not arm auto-merge on PR #${PR_NUMBER} (checks may already be red or merge state blocked). Will retry on next staging push."
          fi
