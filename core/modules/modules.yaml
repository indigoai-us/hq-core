# HQ Modules Manifest
# Declares external modules to sync into your HQ instance
#
# Modules allow you to pull in functionality from other repos:
# - Core HQ updates (workers, commands, knowledge)
# - Company-specific modules (team workflows, shared knowledge)
# - Community modules (third-party integrations)

version: "1.0"

modules:
  # Core HQ module - official updates and improvements
  - name: hq-core
    repo: https://github.com/indigoai-us/hq.git
    branch: main
    strategy: merge  # merge updates with local changes
    access: public
    paths:
      core/knowledge/public/Ralph: core/knowledge/public/Ralph
      core/knowledge/public/workers: core/knowledge/public/workers
      .claude/commands: .claude/commands

  # ─── Public Knowledge Repos ───────────────────────────────────────────
  # Each knowledge folder is its own git repo, symlinked into HQ.
  # Strategy: link (repos live locally at repos/public/ or repos/private/).

  - name: knowledge-ralph
    repo: https://github.com/{your-name}/ralph-methodology.git
    branch: main
    strategy: link
    access: public
    paths:
      docs: core/knowledge/public/Ralph

  - name: knowledge-ai-security
    repo: https://github.com/{your-name}/knowledge-ai-security.git
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/ai-security-framework

  - name: knowledge-dev-team
    repo: https://github.com/{your-name}/knowledge-dev-team.git
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/dev-team

  - name: knowledge-hq-core
    repo: https://github.com/{your-name}/knowledge-hq-core.git
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/hq-core

  - name: knowledge-loom
    repo: https://github.com/{your-name}/knowledge-loom.git
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/loom

  - name: knowledge-workers
    repo: https://github.com/{your-name}/knowledge-workers.git
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/workers

  - name: knowledge-projects
    repo: https://github.com/{your-name}/knowledge-projects.git
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/projects

  - name: knowledge-getting-started
    repo: local
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/getting-started

  - name: knowledge-curious-minds
    repo: local
    branch: main
    strategy: link
    access: public
    paths:
      .: core/knowledge/public/curious-minds

  - name: knowledge-agent-browser
    repo: local
    branch: main
    strategy: embedded
    access: public
    paths:
      .: core/knowledge/public/agent-browser

  - name: knowledge-linear
    repo: https://github.com/{your-name}/knowledge-linear.git
    branch: main
    strategy: link
    access: team
    paths:
      .: core/knowledge/private/linear

  # ─── Company Knowledge Repos ──────────────────────────────────────────

  - name: knowledge-{product}
    repo: https://github.com/{your-name}/knowledge-{product}.git
    branch: main
    strategy: embedded
    access: team
    paths:
      .: companies/{product}/knowledge

  - name: knowledge-{company}
    repo: https://github.com/{your-name}/knowledge-{company}.git
    branch: main
    strategy: embedded
    access: team
    paths:
      .: companies/{company}/knowledge

  # Add one entry per company knowledge repo you maintain.
  # `strategy: embedded` for a private repo sync; `strategy: link` for a local clone.

  # ─── Add-On Kits ────────────────────────────────────────────────────

  - name: hq-social-kit
    repo: https://github.com/{your-name}/hq-social-kit.git
    branch: main
    strategy: link
    access: team
    paths:
      commands: .claude/commands

  - name: gstack
    repo: https://github.com/garrytan/gstack.git
    branch: main
    strategy: link
    access: public
    paths:
      .: .claude/skills  # bridged with g- prefix via core/scripts/gstack-bridge.sh
    notes: >
      Skills bridged with g- prefix. Run core/scripts/gstack-bridge.sh update to pull
      latest and re-link. browse skill excluded (use /agent-browser instead).

# Schema Reference:
#
# modules[]:
#   name: string           # Unique identifier for this module
#   repo: string           # Git repository URL
#   branch: string         # Branch to sync from (default: main)
#   strategy: enum         # Sync strategy:
#                          #   - link: symlink (real-time, requires local clone)
#                          #   - merge: git merge (preserves local changes)
#                          #   - copy: one-time copy (no ongoing sync)
#   access: string         # Access level for future RBAC:
#                          #   - public: anyone can use
#                          #   - team: team members only
#                          #   - role:X: specific role required (e.g., role:admin)
#   paths: object          # Source path -> destination path mappings
#                          # Keys are paths in the source repo
#                          # Values are paths in your local HQ
