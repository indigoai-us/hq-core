version: 1
hqVersion: "15.0.50"
updatedAt: "2026-07-15T15:55:05Z"
# hq-core is the minimal scaffold seed. Rich add-ons ship as `@indigoai-us/hq-pack-*`
# npm packages installed into `core/packages/` via `hq install`. See `core/packages/README.md`.
rules:
  locked:
    - .agents/
    - .claude/
    - .codex/
    - .obsidian/
    - AGENTS.md
    - core/
    - companies/_template/
  exclude:
    - .claude/settings.local.json
    # Machine-local runtime artifacts — never release-shipped, never drift-tracked.
    - .claude/launch.json            # per-machine dev-server launch configs
    - .claude/scheduled-tasks/        # live scheduled-task store (managed by the scheduler)
    - .claude/scheduled_tasks.lock    # transient scheduler lock (sessionId/pid)
    # Builder/admin-only tooling (hq-pack-admin) — deliberately NOT base-release content
    # (policy hq-pack-policies-excluded-from-core-release). Canonical source: the hq-pack-admin repo (internal).
    - core/scripts/promote-hq-core-apply.sh
    - core/scripts/promote-hq-core-scan.sh
    - core/scripts/promote-hq-core-diff-report.py
    - .claude/kit/                    # publish-kit allowlist + schema
    - .claude/audit-rules.yaml        # promote/publish audit ruleset
    - .claude/scrub-denylist.yaml     # publish-kit secret-scrub exceptions
  reviewable: []
  open:
    - "**"
# Packs recommended for a full batteries-included experience. `npx create-hq`
# prompts to install these on first run; `--full` installs unconditionally;
# `--minimal` skips. `conditional` predicates (bash -c evaluated) let a pack
# opt out when the host lacks prerequisites — e.g. skip gemini-pack when the
# `gemini` binary is not on PATH.
#
# `source` is consumed verbatim by `hq install` and supports all three
# transports: `@scope/name[@version]` (npm), `github:owner/repo#<subpath>@<ref>`
# or any git URL (git), `./path | /abs | file:...` (local). We point at the
# public `indigoai-us/hq-packages` monorepo via `github:` shorthand + subpath
# so no npm registry auth is required on first run. (Previously sourced from
# `indigoai-us/hq#core/packages/*`; that monorepo was archived into
# `indigoai-us/junkyard` on 2026-05-18 and the packs were extracted into
# their own public repo.) When packs publish to npm later, swap each
# `source:` to its `@indigoai-us/hq-pack-*` form — no other wiring changes.
recommended_packages:
  - source: 'github:indigoai-us/hq-packages#packages/hq-pack-design-styles'
    description: 'Curated style packs (registry + pack schema + reference MDCs)'
  - source: 'github:indigoai-us/hq-packages#packages/hq-pack-design-quality'
    description: 'Typography, color, spatial, motion quality references for design-audit skills'
  - source: 'github:indigoai-us/hq-packages#packages/hq-pack-gemini'
    description: 'Gemini CLI workers (coder, reviewer, frontend, designer, stylist, ux-auditor) + gemini-cli knowledge'
    conditional: 'command -v gemini >/dev/null 2>&1'
  - source: 'github:indigoai-us/hq-packages#packages/hq-pack-gstack'
    description: 'gstack-team workers (26 g-* skills) + core/scripts/gstack-bridge.sh'
  - source: 'github:indigoai-us/hq-packages#packages/hq-pack-engineering'
    description: 'Engineering capabilities (17 skills, 6 workers, 4 knowledge bases, 4 policies) extracted from hq-core in v15.0.0. Auto-installed by /update-hq for anyone upgrading from <15.0.0 (transparent — preserves /tdd, /review, /execute-task, /architect, /diagnose, /investigate, /run-project, /land, qa-tester, security-scanner, etc. at their original paths); opt-in for greenfield via hq install.'
    # auto_install: when true AND the conditional below passes, /update-hq's
    # Phase 5d-PRE installs this pack WITHOUT prompting and lands its symlinks
    # before removing the inline copies — so upgraders keep every engineering
    # capability with zero prompts (the v15.0.0 transparent-extraction contract).
    # On install failure /update-hq keeps the inline copies in place (no loss).
    auto_install: true
    # The conditional gates greenfield OUT: it matches only a real inline dir
    # (`-d X && ! -L X`), so a fresh `npx create-hq` (no engineering surface) and
    # an already-migrated host (paths are now pack symlinks) both skip — keeping
    # engineering opt-in for non-coders. Coders on a green install opt in with
    # `hq install ...#packages/hq-pack-engineering` (see CHANGELOG.md).
    conditional: '[ -d .claude/skills/tdd ] && [ ! -L .claude/skills/tdd ] || [ -d .claude/skills/review ] && [ ! -L .claude/skills/review ] || [ -d .claude/skills/execute-task ] && [ ! -L .claude/skills/execute-task ] || [ -d .claude/skills/architect ] && [ ! -L .claude/skills/architect ] || [ -d .claude/skills/run-project ] && [ ! -L .claude/skills/run-project ] || [ -d core/workers/public/qa-tester ] && [ ! -L core/workers/public/qa-tester ] || [ -d core/workers/public/security-scanner ] && [ ! -L core/workers/public/security-scanner ]'
# Paths the menubar app (and the /personal:replace-from-staging skill)
# may overwrite when applying an `hq-core-staging` release on top of the
# local HQ root. Acts as the source of truth so the UI confirmation list,
# the script's wipe set, and any future consumers stay in lock-step. Anything
# not listed under `paths:` is left untouched. Files listed under
# `preserve_subpaths:` are backed up to mktemp before the wipe and restored
# after the overlay rsync, so user-local state inside an otherwise-replaced
# tree survives the operation.
replace_from_staging:
  paths:
    - .agents
    - .codex
    - .claude
    - core
    - .obsidian
    - AGENTS.md
  preserve_subpaths:
    - .claude/settings.local.json
# checksums are recomputed by the hq-core publish tooling. Intentionally omitted
# on first commit; regenerated on the first publish that runs checksum tooling.
checksums: {}
