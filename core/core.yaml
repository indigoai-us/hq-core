# hq-core is the minimal scaffold seed. Rich add-ons ship as `@indigoai-us/hq-pack-*`
# npm packages installed into `core/packages/` via `hq install`. See `core/packages/README.md`.
rules:
  locked:
    - .claude/CLAUDE.md
    - .claude/settings.json
    - .claude/hooks/
    - core/policies/
    - core/modules/
    - companies/manifest.yaml
    - companies/_template/
    - core/workers/registry.yaml
    - core/scripts/
    - core/core.yaml
    - CHANGELOG.md
    - MIGRATION.md
  reviewable:
    - workspace/
    - .claude/commands/
    - .claude/skills/
    - core/packages/
  open:
    - "**"
# Packs recommended for a full batteries-included experience. `npx create-hq`
# prompts to install these on first run; `--full` installs unconditionally;
# `--minimal` skips. `conditional` predicates (bash -c evaluated) let a pack
# opt out when the host lacks prerequisites — e.g. skip gemini-pack when the
# `gemini` binary is not on PATH.
#
# `source` is consumed verbatim by `hq install` and supports all three
# transports: `@scope/name[@version]` (npm), `github:owner/repo#<subpath>@<ref>`
# or any git URL (git), `./path | /abs | file:...` (local). We point at the
# hq monorepo via `github:` shorthand + subpath so no npm registry auth is
# required on first run. When packs publish to npm later, swap each `source:`
# to its `@indigoai-us/hq-pack-*` form — no other wiring changes.
recommended_packages:
  - source: 'github:indigoai-us/hq#core/packages/hq-pack-design-styles'
    description: 'Curated style packs (registry + pack schema + reference MDCs)'
  - source: 'github:indigoai-us/hq#core/packages/hq-pack-design-quality'
    description: 'Typography, color, spatial, motion quality references for design-audit skills'
  - source: 'github:indigoai-us/hq#core/packages/hq-pack-gemini'
    description: 'Gemini CLI workers (coder, reviewer, frontend, designer, stylist, ux-auditor) + gemini-cli knowledge'
    conditional: 'command -v gemini >/dev/null 2>&1'
  - source: 'github:indigoai-us/hq#core/packages/hq-pack-gstack'
    description: 'gstack-team workers (26 g-* skills) + core/scripts/gstack-bridge.sh'
