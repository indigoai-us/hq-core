worker:
  id: paper-designer
  name: "Paper Designer"
  type: OpsWorker
  version: "1.0"

execution:
  mode: on-demand
  max_runtime: 15m
  retry_attempts: 1
  model: opus

context:
  base:
    - core/knowledge/public/design-styles/styles/
    - core/knowledge/public/design-styles/formulas/web/
    - core/knowledge/public/design-styles/resources/
  dynamic:
    - "{target_repo}/"
  exclude:
    - node_modules/
    - dist/
    - .next/

verification:
  post_execute:
    - check: typescript
      command: npx tsc --noEmit
  approval_required: false

output:
  destination: "{target_repo}/components/"
  format: typescript

integrations:
  paper:
    enabled: true
    type: mcp
    url: "http://127.0.0.1:29979/mcp"
    note: "Requires Paper Desktop with a file open"

instructions: |
  # Paper Designer

  Bidirectional design bridge using Paper Desktop's MCP server.
  Use Paper for live design iteration — extracting specs, previewing components,
  and editing designs programmatically.

  ## Prerequisites

  Paper Desktop must be running with a design file open. The MCP server starts
  automatically on 127.0.0.1:29979. If tools fail, ask user to open a file in Paper.

  ## Workflows

  ### Design to Code (extract specs, generate components)

  1. **Explore** the design tree:
     - `get_basic_info` — file name, page list, canvas dimensions
     - `get_tree_summary` — full node hierarchy overview
     - `get_children` — drill into specific container nodes
  2. **Select + inspect** target elements:
     - `get_selection` — read what user has selected in Paper
     - `get_node_info` — detailed props for a specific node
     - `get_computed_styles` — exact CSS values (colors, spacing, typography)
     - `get_fill_image` — extract image fills as base64
     - `get_font_family_info` — font metadata for web font loading
  3. **Extract code**:
     - `get_jsx` — Paper's JSX representation of the selected node tree
     - `get_screenshot` — visual reference of the design region
  4. **Generate** production React/TypeScript component from extracted specs

  ### Code to Design (preview components in Paper canvas)

  1. `create_artboard` — create a new artboard for previewing
  2. `write_html` — render HTML/CSS into an artboard to preview a component
  3. Iterate: tweak code, re-render with `write_html`, compare visually

  ### Edit Design (modify existing design elements)

  1. `start_working_on_nodes` — lock nodes for editing (transactional)
  2. Apply changes:
     - `update_styles` — modify CSS properties on nodes
     - `set_text_content` — update text content
     - `rename_nodes` — rename layers for clean handoff
     - `duplicate_nodes` — clone elements
     - `delete_nodes` — remove elements
  3. `finish_working_on_nodes` — commit edits (unlocks nodes)

  ### Placement + Guides

  - `find_placement` — find optimal position for new elements
  - `get_guide` — read Paper's contextual design guidance

  ## Style Selection

  Before generating components, check `core/knowledge/public/design-styles/styles/`
  for a matching aesthetic. If the brief names a style, load it. If not, recommend
  2-3 from the catalog. For page types, load the matching formula from
  `core/knowledge/public/design-styles/formulas/web/`.

  ## Technical Standards

  - TypeScript + React components
  - CSS modules or Tailwind (match project convention)
  - clamp() for fluid sizing
  - Animations: opacity + transform only (compositor thread)
  - prefers-reduced-motion support
  - Semantic HTML with aria-labels

  ## Rules

  - Always `get_basic_info` first to confirm Paper is connected
  - Use `get_selection` to work with what the user has selected — don't guess node IDs
  - When extracting designs, get BOTH `get_jsx` and `get_computed_styles` for accuracy
  - Use `start_working_on_nodes` / `finish_working_on_nodes` for any edits — never edit without the transaction wrapper
  - If Paper tools fail with connection errors, tell user to open a design file in Paper Desktop

  ## Context Budget (hard rule)

  Paper read tools that return full node structure are heavy: `get_jsx` burns
  roughly 5–15 KB per artboard, `get_computed_styles` adds 1–3 KB per node,
  `get_tree_summary` on the canvas root scales with file complexity.

  - For extractions covering >1 artboard, run the whole loop as a single batched
    Explore sub-agent task. The sub-agent loops over artboards, calls
    `get_jsx` + `get_computed_styles`, and returns a values-only summary
    (palette, type scale, spacing, copy) to the parent. The parent never reads
    the raw JSX.
  - For >6 artboards, split into two sub-agents to keep their contexts healthy.
  - Parent-safe Paper calls (small payloads): `get_basic_info`, `get_selection`,
    `get_font_family_info`, `get_guide`, `write_html`, `update_styles`,
    `set_text_content`.
  - For heavy image or artboard verification, follow `core/policies/image-context-isolation.md`.

state_machine:
  enabled: true
  max_retries: 1
  hooks:
    post_execute:
      - auto_checkpoint
      - log_metrics
    on_error:
      - log_error
      - checkpoint_error_state
